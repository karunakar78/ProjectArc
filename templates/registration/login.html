{% extends 'base.html' %}

{% block title %}Login — ProjectArc{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">

    <div class="card p-4 mt-5">
      <div class="text-center mb-4">
        <i class="bi bi-journal-code fs-1 text-dark"></i>
        <h4 class="mt-2 fw-bold">ProjectArc</h4>
        <p class="text-muted small">Sign in to continue</p>
      </div>

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input
            type="text"
            name="username"
            class="form-control"
            placeholder="Enter username"
            autofocus
            required
          />
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Enter password"
            required
          />
        </div>

        <!-- show form errors if login failed -->
        {% if form.errors %}
          <div class="alert alert-danger py-2 small">
            Invalid username or password. Please try again.
          </div>
        {% endif %}

        <div class="d-grid mt-4">
          <button type="submit" class="btn btn-dark">
            <i class="bi bi-box-arrow-in-right"></i> Sign In
          </button>
        </div>
      </form>
    </div>

    <p class="text-center text-muted small mt-3">
      Contact your coordinator if you don't have an account.
    </p>

  </div>
</div>
{% endblock %}
